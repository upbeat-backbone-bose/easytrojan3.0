name: Build and Publish Caddy for X86 and ARM

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. v2.11.2)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  security-events: write

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          format: gcc
          ignore_paths: >-
            ./README.md
            ./CHANGELOG.md

  build:
    runs-on: ubuntu-latest
    needs: shellcheck
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            asset_name: caddy_amd64
          - arch: arm64
            goarch: arm64
            asset_name: caddy_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26'

      - name: Cache xcaddy
        uses: actions/cache@v5.0.5
        with:
          path: /usr/local/bin/xcaddy
          key: xcaddy-0.4.5-${{ runner.os }}
          restore-keys: |
            xcaddy-0.4.5-${{ runner.os }}

      - name: Run tests
        run: |
          chmod +x tests/test_all.sh
          bash tests/test_all.sh

      - name: Install xcaddy
        run: |
          if [ ! -f /usr/local/bin/xcaddy ]; then
            curl -L "https://github.com/caddyserver/xcaddy/releases/download/v0.4.5/xcaddy_0.4.5_linux_amd64.tar.gz" -o xcaddy.tar.gz
            tar -zx -C /usr/local/bin -f xcaddy.tar.gz
          fi
          chmod +x /usr/local/bin/xcaddy
          /usr/local/bin/xcaddy version

      - name: Build Caddy for ${{ matrix.arch }}
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} xcaddy build \
            --with github.com/imgk/caddy-trojan \
            --output ${{ matrix.asset_name }}

      - name: Verify binary
        run: |
          file ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
          ls -lh ${{ matrix.asset_name }}

      - name: Generate SHA256 checksum
        run: |
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: caddy_*
          merge-multiple: true

      - name: Display artifacts
        run: |
          ls -lh
          echo "---"
          echo "SHA256 Checksums:"
          cat *.sha256

      - name: Read checksums
        id: checksums
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat *.sha256 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          name: "Caddy Trojan ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          body: |
            Release of caddy-trojan binaries.

            ## Supported Architectures

            - Linux amd64
            - Linux arm64

            ## SHA256 Checksums

            ```
            ${{ steps.checksums.outputs.content }}
            ```

            ## Installation

            Download the binary for your architecture:

            ```bash
            # For x86_64
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}/caddy_amd64
            
            # For ARM64
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}/caddy_arm64
            ```

            Verify the checksum:

            ```bash
            sha256sum -c caddy_*.sha256
            ```
          files: |
            caddy_amd64
            caddy_amd64.sha256
            caddy_arm64
            caddy_arm64.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
