name: Build and Publish Caddy for X86 and ARM

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g. 2.11.2 or v2.11.2)'
        required: false
        type: string
  push:
    tags:
      - '*.*.*'
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            asset_name: caddy_amd64
          - arch: arm64
            goarch: arm64
            asset_name: caddy_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install xcaddy
        run: |
          curl -L "https://github.com/caddyserver/xcaddy/releases/download/v0.4.5/xcaddy_0.4.5_linux_amd64.tar.gz" -o xcaddy.tar.gz
          tar -zx -C /usr/local/bin -f xcaddy.tar.gz
          chmod +x /usr/local/bin/xcaddy

      - name: Build Caddy for ${{ matrix.arch }}
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} xcaddy build \
            --with github.com/imgk/caddy-trojan \
            --output ${{ matrix.asset_name }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          name: "Caddy Trojan ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          body: "Release of caddy-trojan binaries for ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}.\n\nSupported architectures:\n- Linux amd64\n- Linux arm64"
          files: ${{ matrix.asset_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
